<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>এডমিন প্যানেল</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg, var(--forest-dark), var(--forest));">
  <div class="form-card" style="max-width:380px; width:100%;">
    <div class="text-center" style="margin-bottom:20px;">
      <div class="brand-mark" style="margin:0 auto 12px;">🧳</div>
      <h2 style="margin:0;">এডমিন লগইন</h2>
      <p class="text-muted">শুধুমাত্র অনুমোদিত ব্যবহারকারীদের জন্য</p>
    </div>
    <form id="login-form">
      <div class="form-group"><label>ইউজারনেম</label><input type="text" name="username" required autofocus></div>
      <div class="form-group"><label>পাসওয়ার্ড</label><input type="password" name="password" required></div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">লগইন করুন</button>
    </form>
  </div>
</div>

<div class="admin-shell" id="admin-shell" style="display:none;">
  <aside class="admin-sidebar no-print">
    <div class="brand">
      <div class="brand-mark">🧳</div>
      <div>
        <div class="brand-name js-group-name" style="font-size:1.05rem;"></div>
        <div style="font-size:0.78rem; opacity:0.7;" id="sidebar-user"></div>
      </div>
    </div>
    <nav class="admin-nav" id="admin-nav">
      <a href="#" data-tab="packages" class="active">📦 প্যাকেজ সমূহ</a>
      <a href="#" data-tab="new-package">➕ নতুন প্যাকেজ</a>
      <a href="#" data-tab="bookings">🎫 বুকিং ব্যবস্থাপনা</a>
      <a href="#" data-tab="expenses">💸 খরচ এন্ট্রি</a>
      <a href="#" data-tab="reports" class="admin-only">📊 আয়-ব্যয় রিপোর্ট</a>
      <a href="#" data-tab="admins" class="admin-only">👥 এডমিন ব্যবস্থাপনা</a>
      <a href="#" id="logout-link" style="margin-top:20px; opacity:0.6;">🚪 লগআউট</a>
    </nav>
  </aside>

  <main class="admin-main" id="admin-main"><div class="spinner"></div></main>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
function checkSession() {
  const session = Session.get();
  if (session) {
    qs('#login-screen').style.display = 'none';
    qs('#admin-shell').style.display = 'flex';
    qs('#sidebar-user').textContent = session.name + ' (' + roleLabel(session.role) + ')';
    if (session.role !== 'admin') qsa('.admin-only').forEach(el => el.style.display = 'none');
    loadTab('packages');
  }
}
function roleLabel(role) { return role === 'admin' ? 'প্রধান এডমিন' : 'সহকারী এডমিন'; }

qs('#login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = qs('#login-btn');
  btn.disabled = true; btn.textContent = 'যাচাই হচ্ছে...';
  const fd = new FormData(e.target);
  try {
    const res = await apiPost('login', { username: fd.get('username'), password: fd.get('password') });
    if (!res.ok) { showToast(res.error, 'error'); btn.disabled = false; btn.textContent = 'লগইন করুন'; return; }
    Session.set(res.data);
    checkSession();
  } catch (err) {
    showToast('সংযোগ ত্রুটি: ' + err.message, 'error');
    btn.disabled = false; btn.textContent = 'লগইন করুন';
  }
});

qs('#logout-link').addEventListener('click', (e) => { e.preventDefault(); Session.clear(); location.reload(); });

qsa('.admin-nav a[data-tab]').forEach(a => {
  a.addEventListener('click', (e) => {
    e.preventDefault();
    qsa('.admin-nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    loadTab(a.dataset.tab);
  });
});

const TABS = {
  packages: renderPackagesTab,
  'new-package': renderNewPackageTab,
  bookings: renderBookingsTab,
  expenses: renderExpensesTab,
  reports: renderReportsTab,
  admins: renderAdminsTab
};

async function loadTab(name) {
  const main = qs('#admin-main');
  main.innerHTML = '<div class="spinner"></div>';
  try { await TABS[name](); }
  catch (err) { main.innerHTML = '<div class="empty-state">লোড করতে সমস্যা: ' + err.message + '</div>'; }
}

// ============================================================
// ১. প্যাকেজ তালিকা (এডিট বাটনসহ)
// ============================================================

async function renderPackagesTab() {
  const main = qs('#admin-main');
  const res = await apiGet('getPackages', null, { noCache: true });
  if (!res.ok) throw new Error(res.error);
  const packages = res.data;

  main.innerHTML = `
    <div class="flex-between"><h2>প্যাকেজ সমূহ</h2></div>
    <div class="table-wrap"><table>
      <thead><tr><th>স্পট</th><th>তারিখ</th><th>দিন</th><th>ডেলিগেট</th><th>ফি</th><th>স্ট্যাটাস</th><th>লিংক</th><th>কার্যক্রম</th></tr></thead>
      <tbody>
        ${packages.map(p => `
          <tr>
            <td><strong>${escapeHtml(p.spotName)}</strong></td>
            <td>${formatDate(p.startDate)} - ${formatDate(p.endDate)}</td>
            <td>${toBengaliNumber(p.totalDays)}</td>
            <td>${toBengaliNumber(p.delegateCount)}</td>
            <td>${formatTaka(p.delegateFee)}</td>
            <td><span class="status-chip status-confirmed">${p.status}</span></td>
            <td><a href="booking.html?pkg=${p.slug}" target="_blank">বুকিং লিংক ↗</a></td>
            <td>
              <button class="btn btn-sm btn-forest edit-pkg-btn" data-id="${p.id}">✏️ এডিট</button>
              <button class="btn btn-sm btn-outline-forest print-sheet-btn" data-id="${p.id}">🖨️ বুকিং শীট</button>
            </td>
          </tr>
        `).join('') || '<tr><td colspan="8" class="text-center text-muted">কোনো প্যাকেজ নেই</td></tr>'}
      </tbody>
    </table></div>
    <div id="edit-pkg-area" class="mt-24"></div>
  `;

  qsa('.edit-pkg-btn').forEach(btn => btn.addEventListener('click', () => openEditPackage(packages.find(p => p.id === btn.dataset.id))));
  qsa('.print-sheet-btn').forEach(btn => btn.addEventListener('click', () => openBookingSheetPrint(packages.find(p => p.id === btn.dataset.id))));
}

// ---------- প্যাকেজ এডিট ----------

let editVehicleRows = [];

function openEditPackage(pkg) {
  editVehicleRows = JSON.parse(JSON.stringify(pkg.vehicles));
  const area = qs('#edit-pkg-area');
  area.innerHTML = `
    <div class="form-card" style="max-width:680px;">
      <h3 style="margin-top:0;">✏️ প্যাকেজ এডিট করুন — ${escapeHtml(pkg.spotName)}</h3>
      <form id="edit-pkg-form">
        <div class="form-group"><label>পর্যটন কেন্দ্রের নাম *</label><input type="text" name="spotName" value="${escapeHtml(pkg.spotName)}" required></div>
        <div class="form-row">
          <div class="form-group"><label>শুরুর তারিখ *</label><input type="date" name="startDate" value="${pkg.startDate ? new Date(pkg.startDate).toISOString().split('T')[0] : ''}" required></div>
          <div class="form-group"><label>শেষের তারিখ *</label><input type="date" name="endDate" value="${pkg.endDate ? new Date(pkg.endDate).toISOString().split('T')[0] : ''}" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>মোট দিন *</label><input type="number" name="totalDays" value="${pkg.totalDays}" min="1" required></div>
          <div class="form-group"><label>ডেলিগেট সংখ্যা *</label><input type="number" name="delegateCount" value="${pkg.delegateCount}" min="1" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>জনপ্রতি ডেলিগেট ফি *</label><input type="number" name="delegateFee" value="${pkg.delegateFee}" min="0" required></div>
          <div class="form-group"><label>স্ট্যাটাস</label>
            <select name="status">
              <option value="active" ${pkg.status === 'active' ? 'selected' : ''}>সক্রিয়</option>
              <option value="closed" ${pkg.status === 'closed' ? 'selected' : ''}>বন্ধ</option>
            </select>
          </div>
        </div>
        <fieldset>
          <legend>🚌 গাড়ির তথ্য <span class="text-muted" style="font-weight:400; font-size:0.8rem;">(নতুন গাড়ি যোগ করা যাবে, বিদ্যমান গাড়ির সীট সংখ্যা পরিবর্তন করলে আগের বুকিং প্রভাবিত হবে না)</span></legend>
          <div id="edit-vehicle-rows"></div>
          <button type="button" class="btn btn-sm btn-forest" id="edit-add-vehicle-btn">+ নতুন গাড়ি যোগ করুন</button>
        </fieldset>
        <div class="form-group"><label>অতিরিক্ত নোট</label><textarea name="coverNote" rows="2">${escapeHtml(pkg.coverNote || '')}</textarea></div>
        <div class="flex-between">
          <button type="submit" class="btn btn-primary" id="edit-pkg-submit-btn">পরিবর্তন সংরক্ষণ করুন</button>
          <button type="button" class="btn btn-outline-forest" id="cancel-edit-btn">বাতিল</button>
        </div>
      </form>
    </div>
  `;
  renderEditVehicleRows();
  qs('#edit-add-vehicle-btn').addEventListener('click', () => { editVehicleRows.push({ name: '', type: 'বাস', seatCount: 30 }); renderEditVehicleRows(); });
  qs('#cancel-edit-btn').addEventListener('click', () => { area.innerHTML = ''; });
  qs('#edit-pkg-form').addEventListener('submit', (e) => submitEditPackage(e, pkg.id));
  area.scrollIntoView({ behavior: 'smooth' });
}

function renderEditVehicleRows() {
  const container = qs('#edit-vehicle-rows');
  container.innerHTML = editVehicleRows.map((v, i) => `
    <div class="form-row" style="grid-template-columns: 1.4fr 1fr 0.8fr auto; align-items:end; margin-bottom:10px;">
      <div class="form-group" style="margin:0;"><label>গাড়ির নাম</label><input type="text" data-idx="${i}" data-field="name" value="${escapeHtml(v.name)}"></div>
      <div class="form-group" style="margin:0;"><label>ধরন</label>
        <select data-idx="${i}" data-field="type">
          <option value="বাস" ${v.type === 'বাস' ? 'selected' : ''}>বাস</option>
          <option value="হাইস" ${v.type === 'হাইস' ? 'selected' : ''}>হাইস</option>
          <option value="নোয়াহ" ${v.type === 'নোয়াহ' ? 'selected' : ''}>নোয়াহ</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;"><label>সীট সংখ্যা</label><input type="number" min="1" data-idx="${i}" data-field="seatCount" value="${v.seatCount}"></div>
      <button type="button" class="btn btn-sm btn-danger edit-remove-vehicle" data-idx="${i}" ${editVehicleRows.length === 1 ? 'disabled' : ''}>✕</button>
    </div>
  `).join('');
  qsa('#edit-vehicle-rows input, #edit-vehicle-rows select').forEach(el => {
    el.addEventListener('input', () => {
      const idx = Number(el.dataset.idx);
      editVehicleRows[idx][el.dataset.field] = el.dataset.field === 'seatCount' ? Number(el.value) : el.value;
    });
  });
  qsa('.edit-remove-vehicle').forEach(btn => btn.addEventListener('click', () => { editVehicleRows.splice(Number(btn.dataset.idx), 1); renderEditVehicleRows(); }));
}

async function submitEditPackage(e, pkgId) {
  e.preventDefault();
  const btn = qs('#edit-pkg-submit-btn');
  btn.disabled = true; btn.textContent = 'সংরক্ষণ হচ্ছে...';
  const fd = new FormData(e.target);
  try {
    const res = await apiPost('updatePackage', {
      id: pkgId,
      spotName: fd.get('spotName'), startDate: fd.get('startDate'), endDate: fd.get('endDate'),
      totalDays: Number(fd.get('totalDays')), delegateCount: Number(fd.get('delegateCount')),
      delegateFee: Number(fd.get('delegateFee')), status: fd.get('status'),
      coverNote: fd.get('coverNote'), vehicles: editVehicleRows
    });
    if (!res.ok) throw new Error(res.error);
    showToast('প্যাকেজ হালনাগাদ হয়েছে', 'success');
    qs('#edit-pkg-area').innerHTML = '';
    loadTab('packages');
  } catch (err) {
    showToast('ত্রুটি: ' + err.message, 'error');
    btn.disabled = false; btn.textContent = 'পরিবর্তন সংরক্ষণ করুন';
  }
}

// ---------- প্যাকেজ ভিত্তিক বুকিং শীট প্রিন্ট ----------

async function openBookingSheetPrint(pkg) {
  showToast('বুকিং শীট তৈরি হচ্ছে...', 'info');
  const [seatRes, bkRes] = await Promise.all([
    apiGet('getSeats', { packageId: pkg.id }, { noCache: true }),
    apiGet('getBookings', { packageId: pkg.id }, { noCache: true })
  ]);
  const seats = seatRes.ok ? seatRes.data : [];
  const bookings = bkRes.ok ? bkRes.data.filter(b => b.status !== 'cancelled') : [];

  const seatBookingMap = {};
  bookings.forEach(b => {
    (b.seats || []).forEach(s => { seatBookingMap[s.vehicleName + '|' + s.seatNo] = b; });
  });

  const win = window.open('', '_blank');
  const rowsHtml = pkg.vehicles.map(v => {
    const vSeats = seats.filter(s => s.vehicleName === v.name).sort((a, b) => a.seatNo.localeCompare(b.seatNo));
    return `
      <h3 style="margin-top:24px;">${escapeHtml(v.name)} (${escapeHtml(v.type || '')}) — ${toBengaliNumber(v.seatCount)} সীট</h3>
      <table border="1" cellspacing="0" cellpadding="8" style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead><tr style="background:#eee;"><th>সীট নং</th><th>বুকিংকারীর নাম</th><th>মোবাইল নং</th><th>স্ট্যাটাস</th></tr></thead>
        <tbody>
          ${vSeats.map(s => {
            const b = seatBookingMap[v.name + '|' + s.seatNo];
            return `<tr>
              <td style="text-align:center; font-weight:bold;">${escapeHtml(s.seatNo)}</td>
              <td>${b ? escapeHtml(b.name) : ''}</td>
              <td>${b ? escapeHtml(b.mobile) : ''}</td>
              <td style="text-align:center;">${b ? (b.status === 'confirmed' ? 'কনফার্ম' : 'অপেক্ষমান') : (s.status === 'held' ? 'হোল্ড' : 'খালি')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  }).join('');

  win.document.write(`
    <html><head><meta charset="UTF-8"><title>বুকিং শীট - ${escapeHtml(pkg.spotName)}</title>
    <style>
      body { font-family: 'Hind Siliguri', sans-serif; padding: 30px; }
      h2 { margin-bottom: 4px; }
      .meta { color: #555; margin-bottom: 20px; font-size: 14px; }
    </style></head>
    <body>
      <h2>প্যাকেজ ভিত্তিক বুকিং শীট — ${escapeHtml(pkg.spotName)}</h2>
      <div class="meta">${formatDate(pkg.startDate)} — ${formatDate(pkg.endDate)} · মোট ডেলিগেট: ${toBengaliNumber(pkg.delegateCount)} জন · জনপ্রতি ফি: ${formatTaka(pkg.delegateFee)}</div>
      ${rowsHtml}
      <script>window.onload = () => window.print();<\/script>
    </body></html>
  `);
  win.document.close();
}

// ============================================================
// ২. নতুন প্যাকেজ তৈরি
// ============================================================

let vehicleRows = [{ name: 'বাস-১', type: 'বাস', seatCount: 40 }];

function renderNewPackageTab() {
  const main = qs('#admin-main');
  main.innerHTML = `
    <h2>নতুন ট্যুর প্যাকেজ ঘোষণা</h2>
    <div class="form-card" style="max-width:680px;">
      <form id="pkg-form">
        <div class="form-group"><label>পর্যটন কেন্দ্রের নাম *</label><input type="text" name="spotName" required placeholder="যেমন: সাজেক ভ্যালি"></div>
        <div class="form-row">
          <div class="form-group"><label>শুরুর তারিখ *</label><input type="date" name="startDate" required></div>
          <div class="form-group"><label>শেষের তারিখ *</label><input type="date" name="endDate" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>মোট দিন *</label><input type="number" name="totalDays" min="1" required></div>
          <div class="form-group"><label>ডেলিগেট সংখ্যা (লক্ষ্যমাত্রা) *</label><input type="number" name="delegateCount" min="1" required></div>
        </div>
        <div class="form-group"><label>জনপ্রতি ডেলিগেট ফি (টাকা) *</label><input type="number" name="delegateFee" min="0" required></div>
        <fieldset>
          <legend>🚌 গাড়ির তথ্য</legend>
          <div id="vehicle-rows"></div>
          <button type="button" class="btn btn-sm btn-forest" id="add-vehicle-btn">+ আরেকটি গাড়ি যোগ করুন</button>
        </fieldset>
        <div class="form-group"><label>অতিরিক্ত নোট (ঐচ্ছিক)</label><textarea name="coverNote" rows="2"></textarea></div>
        <button type="submit" class="btn btn-primary btn-block" id="pkg-submit-btn">প্যাকেজ প্রকাশ করুন</button>
      </form>
    </div>
  `;
  renderVehicleRows();
  qs('#add-vehicle-btn').addEventListener('click', () => { vehicleRows.push({ name: '', type: 'বাস', seatCount: 30 }); renderVehicleRows(); });
  qs('#pkg-form').addEventListener('submit', submitNewPackage);
}

function renderVehicleRows() {
  const container = qs('#vehicle-rows');
  container.innerHTML = vehicleRows.map((v, i) => `
    <div class="form-row" style="grid-template-columns: 1.4fr 1fr 0.8fr auto; align-items:end; margin-bottom:10px;">
      <div class="form-group" style="margin:0;"><label>গাড়ির নাম</label><input type="text" data-idx="${i}" data-field="name" value="${escapeHtml(v.name)}" placeholder="যেমন: বাস-১"></div>
      <div class="form-group" style="margin:0;"><label>ধরন</label>
        <select data-idx="${i}" data-field="type">
          <option value="বাস" ${v.type === 'বাস' ? 'selected' : ''}>বাস</option>
          <option value="হাইস" ${v.type === 'হাইস' ? 'selected' : ''}>হাইস</option>
          <option value="নোয়াহ" ${v.type === 'নোয়াহ' ? 'selected' : ''}>নোয়াহ</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;"><label>সীট সংখ্যা</label><input type="number" min="1" data-idx="${i}" data-field="seatCount" value="${v.seatCount}"></div>
      <button type="button" class="btn btn-sm btn-danger remove-vehicle" data-idx="${i}" ${vehicleRows.length === 1 ? 'disabled' : ''}>✕</button>
    </div>
  `).join('');
  qsa('#vehicle-rows input, #vehicle-rows select').forEach(el => {
    el.addEventListener('input', () => {
      const idx = Number(el.dataset.idx);
      vehicleRows[idx][el.dataset.field] = el.dataset.field === 'seatCount' ? Number(el.value) : el.value;
    });
  });
  qsa('.remove-vehicle').forEach(btn => btn.addEventListener('click', () => { vehicleRows.splice(Number(btn.dataset.idx), 1); renderVehicleRows(); }));
}

async function submitNewPackage(e) {
  e.preventDefault();
  const btn = qs('#pkg-submit-btn');
  btn.disabled = true; btn.textContent = 'প্রকাশ হচ্ছে...';
  const fd = new FormData(e.target);

  if (vehicleRows.find(v => !v.name || !v.seatCount)) {
    showToast('প্রতিটি গাড়ির নাম ও সীট সংখ্যা দিন', 'error');
    btn.disabled = false; btn.textContent = 'প্যাকেজ প্রকাশ করুন';
    return;
  }
  try {
    const res = await apiPost('createPackage', {
      spotName: fd.get('spotName'), startDate: fd.get('startDate'), endDate: fd.get('endDate'),
      totalDays: Number(fd.get('totalDays')), delegateCount: Number(fd.get('delegateCount')),
      delegateFee: Number(fd.get('delegateFee')), vehicles: vehicleRows, coverNote: fd.get('coverNote')
    });
    if (!res.ok) throw new Error(res.error);

    qs('[data-tab="packages"]').classList.add('active');

}

async function loadBookingsForPackage(pkgId, pkg) {
  const content = qs('#bookings-content');
  content.innerHTML = '<div class="spinner"></div>';

  const [bkRes, seatRes] = await Promise.all([
    apiGet('getBookings', { packageId: pkgId }, { noCache: true }),
    apiGet('getSeats', { packageId: pkgId }, { noCache: true })
  ]);
  const bookings = bkRes.ok ? bkRes.data : [];
  const seats = seatRes.ok ? seatRes.data : [];

  content.innerHTML = `
    <div class="flex-between" style="margin-bottom:16px;">
      <h3 style="margin:0;">বুকিং তালিকা (${toBengaliNumber(bookings.length)})</h3>
      <div>
        <button class="btn btn-sm btn-outline-forest" id="print-sheet-btn2">🖨️ বুকিং শীট প্রিন্ট</button>
        <button class="btn btn-sm btn-forest" id="hold-seats-btn">🔒 সীট হোল্ড করুন</button>
      </div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>ক্রম</th><th>নাম</th><th>মোবাইল</th><th>সীট সমূহ</th><th>মোট ফি</th><th>জমা</th><th>বকেয়া</th><th>স্ট্যাটাস</th><th>কার্যক্রম</th></tr></thead>
      <tbody>
        ${bookings.map(b => {
          const seatList = (b.seats || []).map(s => s.vehicleName + '-' + s.seatNo).join(', ');
          return `
          <tr>
            <td>${toBengaliNumber(b.serial)}</td>
            <td><strong>${escapeHtml(b.name)}</strong><br><span class="text-muted" style="font-size:0.8rem;">${escapeHtml(b.address)}</span></td>
            <td>${escapeHtml(b.mobile)}</td>
            <td>${escapeHtml(seatList)}</td>
            <td>${formatTaka(b.delegateFee)}</td>
            <td><input type="number" class="paid-input" data-id="${b.id}" data-fee="${b.delegateFee}" value="${b.paidAmount}" style="width:90px; padding:6px 8px; border:1px solid var(--border); border-radius:6px;"></td>
            <td class="due-cell-${b.id}">${formatTaka(b.dueAmount)}</td>
            <td><span class="status-chip status-${b.status}">${statusLabel(b.status)}</span></td>
            <td>
              ${b.status === 'pending' ? `<button class="btn btn-sm btn-primary confirm-btn" data-id="${b.id}">কনফার্ম</button>` : ''}
              ${b.status !== 'cancelled' ? `<button class="btn btn-sm btn-danger cancel-btn" data-id="${b.id}">বাতিল</button>` : ''}
            </td>
          </tr>`;
        }).join('') || '<tr><td colspan="9" class="text-center text-muted">কোনো বুকিং নেই</td></tr>'}
      </tbody>
    </table></div>
  `;

  qsa('.confirm-btn').forEach(btn => btn.addEventListener('click', async () => {
    const session = Session.get();
    btn.disabled = true;
    const res = await apiPost('confirmBooking', { bookingId: btn.dataset.id, confirmedBy: session.username });
    if (res.ok) { showToast('বুকিং কনফার্ম হয়েছে', 'success'); loadBookingsForPackage(pkgId, pkg); }
    else { showToast(res.error, 'error'); btn.disabled = false; }
  }));

  qsa('.cancel-btn').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('এই বুকিংটি বাতিল করতে চান?')) return;
    const res = await apiPost('cancelBooking', { bookingId: btn.dataset.id });
    if (res.ok) { showToast('বুকিং বাতিল হয়েছে', 'success'); loadBookingsForPackage(pkgId, pkg); }
    else showToast(res.error, 'error');
  }));

  qsa('.paid-input').forEach(input => {
    let timeout;
    input.addEventListener('input', () => {
      clearTimeout(timeout);
      const due = Math.max(0, Number(input.dataset.fee) - (Number(input.value) || 0));
      qs('.due-cell-' + input.dataset.id).textContent = formatTaka(due);
      timeout = setTimeout(async () => {
        await apiPost('updatePayment', { bookingId: input.dataset.id, paidAmount: Number(input.value) || 0 });
        showToast('পেমেন্ট হালনাগাদ হয়েছে', 'success');
      }, 700);
    });
  });

  qs('#hold-seats-btn').addEventListener('click', () => openHoldSeatsModal(pkg, seats));
  qs('#print-sheet-btn2').addEventListener('click', () => openBookingSheetPrint(pkg));
}

function statusLabel(status) { return { pending: 'অপেক্ষমান', confirmed: 'কনফার্ম', cancelled: 'বাতিল' }[status] || status; }

function openHoldSeatsModal(pkg, seats) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <button class="modal-close">✕</button>
      <h3>সীট হোল্ড করুন</h3>
      <p class="text-muted">এডমিনের জন্য সংরক্ষিত রাখতে যেসব সীটে ক্লিক করবেন সেগুলো হোল্ড হয়ে যাবে।</p>
      ${pkg.vehicles.map(v => {
        const vSeats = seats.filter(s => s.vehicleName === v.name);
        return `
          <div class="vehicle-block">
            <div class="vehicle-header">${escapeHtml(v.name)}</div>
            <div class="seat-grid">
              ${vSeats.map(s => `<div class="seat ${s.status === 'available' ? 'seat-available' : (s.status === 'booked' ? 'seat-booked' : 'seat-held')}" data-vehicle="${escapeHtml(v.name)}" data-seat="${escapeHtml(s.seatNo)}" data-status="${s.status}">${escapeHtml(s.seatNo)}</div>`).join('')}
            </div>
          </div>
        `;
      }).join('')}
      <button class="btn btn-primary btn-block" id="confirm-hold-btn">নির্বাচিত সীট হোল্ড করুন</button>
    </div>
  `;
  document.body.appendChild(overlay);

  const toHold = [];
  qsa('.seat[data-status="available"]', overlay).forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.vehicle + '|' + el.dataset.seat;
      if (toHold.includes(key)) { toHold.splice(toHold.indexOf(key), 1); el.classList.remove('seat-selected'); }
      else { toHold.push(key); el.classList.add('seat-selected'); }
    });
  });

  overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#confirm-hold-btn').addEventListener('click', async () => {
    if (toHold.length === 0) { showToast('কোনো সীট নির্বাচিত হয়নি', 'error'); return; }
    const byVehicle = {};
    toHold.forEach(k => { const [v, s] = k.split('|'); byVehicle[v] = byVehicle[v] || []; byVehicle[v].push(s); });
    for (const v of Object.keys(byVehicle)) {
      await apiPost('holdSeats', { packageId: pkg.id, vehicleName: v, seats: byVehicle[v], holdNote: 'এডমিন হোল্ড' });
    }
    showToast('সীট হোল্ড করা হয়েছে', 'success');
    overlay.remove();
    loadBookingsForPackage(pkg.id, pkg);
  });
}

function printReport(overall, singlePkg) {
  const win = window.open('', '_blank');
  const rows = singlePkg ? [singlePkg] : overall.perPackage;

  win.document.write(`
    <html><head><meta charset="UTF-8"><title>${title}</title>
    <style>
      body { font-family: 'Hind Siliguri', sans-serif; padding: 30px; }
      table { width:100%; border-collapse:collapse; margin-top:16px; font-size:14px; }
      th, td { border:1px solid #999; padding:8px 10px; text-align:left; }
      th { background:#eee; }
      .totals { margin-top:20px; font-size:15px; }
    </style></head>
    <body>

      <table>
        <thead><tr><th>স্পট</th><th>বুকিং সংখ্যা</th><th>মোট আয়</th><th>মোট ব্যয়</th><th>বকেয়া</th><th>নীট মুনাফা</th></tr></thead>
        <tbody>
          ${rows.map(p => `<tr><td>${escapeHtml(p.spotName)}</td><td>${toBengaliNumber(p.bookings)}</td><td>${formatTaka(p.totalIncome)}</td><td>${formatTaka(p.totalExpense)}</td><td>${formatTaka(p.totalDue)}</td><td>${formatTaka(p.netProfit)}</td></tr>`).join('')}
        </tbody>
      </table>
      ${!singlePkg ? `
      <div class="totals">
        <strong>সর্বমোট আয়:</strong> ${formatTaka(overall.totalIncome)} &nbsp;&nbsp;
        <strong>সর্বমোট ব্যয়:</strong> ${formatTaka(overall.totalExpense)} &nbsp;&nbsp;
        <strong>সর্বমোট বকেয়া:</strong> ${formatTaka(overall.totalDue)} &nbsp;&nbsp;
        <strong>নীট মুনাফা:</strong> ${formatTaka(overall.netProfit)}
      </div>` : ''}
      <script>window.onload = () => window.print();<\/script>
    </body></html>
  `);
  win.document.close();
}

          </tr>
        `).join('')}
      </tbody>
    </table></div>
  `;

  qs('#admin-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const res = await apiPost('manageAdmin', { mode: 'add', username: fd.get('username'), password: fd.get('password'), name: fd.get('name'), role: fd.get('role') });
    if (res.ok) { showToast('যোগ করা হয়েছে', 'success'); renderAdminsTab(); }
    else showToast(res.error, 'error');
  });

  qsa('.del-admin-btn').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('এই এডমিনকে মুছে ফেলতে চান?')) return;
    const res = await apiPost('manageAdmin', { mode: 'delete', username: btn.dataset.username });
    if (res.ok) { showToast('মুছে ফেলা হয়েছে', 'success'); renderAdminsTab(); }
  }));
}

checkSession();
</script>
</body>
</html>
