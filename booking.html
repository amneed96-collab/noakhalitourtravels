<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বুকিং ফরম</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-strip"><div class="container"><span class="js-header-admin-line"></span></div></div>

<header class="site-header">
  <div class="container">
    <div class="brand">
      <div class="brand-mark">🧳</div>
      <div class="brand-name js-group-name"></div>
    </div>
    <nav class="header-nav"><a href="index.html">← প্যাকেজ সমূহ</a></nav>
    <button class="hamburger-btn" aria-label="মেনু"><span></span><span></span><span></span></button>
  </div>
</header>

<section class="section">
  <div class="container" id="page-content"><div class="spinner"></div></div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="js-group-name"></div>
    <div style="margin-top:10px; opacity:0.8; font-weight:600;" class="js-footer-line"></div>
  </div>
</footer>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
const params = new URLSearchParams(location.search);
const pkgIdentifier = params.get('pkg');

let currentPackage = null;
let currentSeats = [];
let selectedSeats = []; // [{vehicleName, seatNo}]

async function init() {
  const content = qs('#page-content');
  if (!pkgIdentifier) {
    content.innerHTML = '<div class="empty-state">কোনো প্যাকেজ নির্বাচিত নেই। <a href="index.html">প্যাকেজ তালিকায় ফিরে যান</a></div>';
    return;
  }
  try {
    // একটাই কল - প্যাকেজ + সীট একসাথে (দ্রুত লোড)
    const res = await apiGet('getPackageFull', { id: pkgIdentifier }, { noCache: true });
    if (!res.ok || !res.data || !res.data.package) throw new Error('প্যাকেজ পাওয়া যায়নি');
    currentPackage = res.data.package;
    currentSeats = res.data.seats;
    render();
  } catch (err) {
    content.innerHTML = '<div class="empty-state">লোড করতে সমস্যা: ' + err.message + '</div>';
  }
}

function render() {
  const content = qs('#page-content');
  const p = currentPackage;

  content.innerHTML = `
    <div class="flex-between" style="margin-bottom: 28px;">
      <div>
        <span class="eyebrow">🎫 বুকিং ফরম</span>
        <h1 style="margin:0;">${escapeHtml(p.spotName)}</h1>
        <p class="text-muted">${formatDate(p.startDate)} — ${formatDate(p.endDate)} · ${toBengaliNumber(p.totalDays)} দিন · ${formatTaka(p.delegateFee)}/জন</p>
      </div>
    </div>

    <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap: 28px;" id="booking-grid">
      <div>
        <h3>🚌 গাড়ি ও সীট নির্বাচন করুন <span class="text-muted" style="font-weight:400; font-size:0.85rem;">(একাধিক সীট বাছাই করা যাবে)</span></h3>
        <div id="vehicle-list"></div>
      </div>
      <div>
        <h3>👤 বুকিং তথ্য</h3>
        <div class="form-card">
          <form id="booking-form">
            <div class="form-group"><label>নাম *</label><input type="text" name="name" required placeholder="আপনার পূর্ণ নাম"></div>
            <div class="form-group"><label>মোবাইল নম্বর *</label><input type="tel" name="mobile" required placeholder="01XXXXXXXXX" pattern="[0-9]{11}"></div>
            <div class="form-group"><label>ঠিকানা *</label><textarea name="address" rows="2" required placeholder="বর্তমান ঠিকানা"></textarea></div>
            <div class="form-group">
              <label>নির্বাচিত সীট সমূহ (<span id="seat-count">০</span>টি)</label>
              <div id="selected-seat-display" style="min-height:44px; background:var(--cream-dark); border-radius:9px; padding:10px 14px; font-weight:700; color:var(--forest);">বামপাশ থেকে সীট বেছে নিন</div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>মোট ডেলিগেট ফি</label><input type="text" id="fee-display" readonly value="${formatTaka(0)}" style="background:var(--cream-dark);"></div>
              <div class="form-group"><label>জমা দিচ্ছেন (টাকা)</label><input type="number" name="paidAmount" min="0" placeholder="0" id="paid-input"></div>
            </div>
            <div class="form-group" id="payment-method-group" style="display:none;">
              <label>পেমেন্ট মাধ্যম *</label>
              <select name="paymentMethod" id="payment-method-select">
                <option value="bkash">📱 বিকাশ</option>
                <option value="nagad">📱 নগদ</option>
                <option value="cash">💵 হাতে হাতে / নগদ পরিশোধ</option>
              </select>
            </div>
            <div class="form-group" id="transaction-id-group" style="display:none;">
              <label>ট্রানজেকশন আইডি (বিকাশ/নগদ) *</label>
              <input type="text" name="transactionId" id="transaction-id-input" placeholder="যেমন: 8N7A2X9K1M">
              <div class="hint">বিকাশ/নগদ থেকে পাঠানো এসএমএস-এ থাকা ট্রানজেকশন আইডিটি বসান</div>
            </div>
            <div class="form-group"><label>বকেয়া থাকবে</label><input type="text" id="due-display" readonly value="${formatTaka(0)}" style="background:var(--cream-dark); color:var(--red); font-weight:700;"></div>
            <button type="submit" class="btn btn-primary btn-block" id="submit-btn" disabled>সীট নির্বাচন করুন</button>
          </form>
        </div>
      </div>
    </div>
  `;

  renderVehicles();

  qs('#paid-input').addEventListener('input', updateFeeDisplay);
  qs('#booking-form').addEventListener('submit', submitBooking);
  if (window.innerWidth < 860) qs('#booking-grid').style.gridTemplateColumns = '1fr';
}

function totalFee() {
  return currentPackage.delegateFee * selectedSeats.length;
}

function updateFeeDisplay() {
  const fee = totalFee();
  qs('#fee-display').value = formatTaka(fee);
  const paid = Number(qs('#paid-input').value) || 0;
  qs('#paid-input').max = fee;
  qs('#due-display').value = formatTaka(Math.max(0, fee - paid));

  const methodGroup = qs('#payment-method-group');
  const txnGroup = qs('#transaction-id-group');
  const methodSelect = qs('#payment-method-select');
  const txnInput = qs('#transaction-id-input');

  if (paid > 0) {
    methodGroup.style.display = '';
    updateTxnVisibility();
  } else {
    methodGroup.style.display = 'none';
    txnGroup.style.display = 'none';
    txnInput.required = false;
  }

  function updateTxnVisibility() {
    if (methodSelect.value === 'cash') {
      txnGroup.style.display = 'none';
      txnInput.required = false;
    } else {
      txnGroup.style.display = '';
      txnInput.required = true;
    }
  }
  methodSelect.onchange = updateTxnVisibility;
}

function renderVehicles() {
  const container = qs('#vehicle-list');
  const vehicles = currentPackage.vehicles || [];
  if (vehicles.length === 0) {
    container.innerHTML = '<div class="empty-state">এই প্যাকেজে কোনো গাড়ি যুক্ত করা হয়নি।</div>';
    return;
  }

  container.innerHTML = `
    <div class="seat-legend">
      <span><span class="legend-dot available"></span> খালি</span>
      <span><span class="legend-dot selected"></span> আপনার নির্বাচন</span>
      <span><span class="legend-dot held"></span> হোল্ড করা</span>
      <span><span class="legend-dot booked"></span> বুক হয়ে গেছে</span>
    </div>
  ` + vehicles.map(v => {
    const vSeats = currentSeats.filter(s => s.vehicleName === v.name);
    const availableCount = vSeats.filter(s => s.status === 'available').length;
    return `
      <div class="vehicle-block">
        <div class="vehicle-header">
          <span>${escapeHtml(v.name)} · ${escapeHtml(v.type || '')}</span>
          <span class="text-muted" style="font-weight:500; font-size:0.85rem;">${toBengaliNumber(availableCount)}/${toBengaliNumber(vSeats.length)} খালি</span>
        </div>
        <div class="seat-grid">${renderSeatRows(v.name, vSeats)}</div>
      </div>
    `;
  }).join('');

  qsa('.seat', container).forEach(el => {
    el.addEventListener('click', () => {
      if (el.classList.contains('seat-booked') || el.classList.contains('seat-held')) return;
      toggleSeat(el.dataset.vehicle, el.dataset.seat);
    });
  });
}

// সীটগুলোকে ৪টা করে সারিতে ভাগ করা (২+গ্যাপ+২), শেষে বিজোড় থাকলে শেষ সারিতে ৫টা
function renderSeatRows(vehicleName, vSeats) {
  const sorted = [...vSeats].sort((a, b) => a.seatNo.localeCompare(b.seatNo, undefined, { numeric: true }));
  const total = sorted.length;
  const remainder = total % 4;
  const rows = [];
  let i = 0;

  // যদি শেষে ১টা বিজোড় সীট বাঁচে, শেষ সারিতে ৫টা রাখা হবে (৪+১)
  const lastRowSize = remainder === 1 && total >= 5 ? 5 : (remainder === 0 ? 4 : remainder);

  while (i < total) {
    const remaining = total - i;
    const rowSize = remaining === remainder + 4 && remainder === 1 ? 4 : (remaining <= lastRowSize ? remaining : 4);
    const chunk = sorted.slice(i, i + (remaining === lastRowSize ? lastRowSize : 4));
    rows.push(chunk);
    i += chunk.length;
  }

  return rows.map(row => {
    if (row.length >= 4) {
      const firstPair = row.slice(0, 2);
      const restPair = row.slice(2);
      return `<div class="seat-row">
        <div class="seat-pair">${firstPair.map(s => renderSeat(vehicleName, s)).join('')}</div>
        <div class="aisle-gap"></div>
        <div class="seat-pair">${restPair.map(s => renderSeat(vehicleName, s)).join('')}</div>
      </div>`;
    }
    // ৪-এর কম হলে (একদম শেষ অসম্পূর্ণ সারি) সাধারণভাবে দেখানো
    return `<div class="seat-row"><div class="seat-pair">${row.map(s => renderSeat(vehicleName, s)).join('')}</div></div>`;
  }).join('');
}

function renderSeat(vehicleName, seat) {
  let cls = 'seat-available';
  if (seat.status === 'booked') cls = 'seat-booked';
  else if (seat.status === 'held') cls = 'seat-held';
  if (selectedSeats.some(s => s.vehicleName === vehicleName && s.seatNo === seat.seatNo)) cls = 'seat-selected';
  return `<div class="seat ${cls}" data-vehicle="${escapeHtml(vehicleName)}" data-seat="${escapeHtml(seat.seatNo)}">${escapeHtml(seat.seatNo)}</div>`;
}

function toggleSeat(vehicleName, seatNo) {
  const idx = selectedSeats.findIndex(s => s.vehicleName === vehicleName && s.seatNo === seatNo);
  if (idx >= 0) selectedSeats.splice(idx, 1);
  else selectedSeats.push({ vehicleName, seatNo });

  renderVehicles();
  qs('#seat-count').textContent = toBengaliNumber(selectedSeats.length);

  const displayEl = qs('#selected-seat-display');
  displayEl.innerHTML = selectedSeats.length === 0
    ? 'বামপাশ থেকে সীট বেছে নিন'
    : selectedSeats.map(s => `${s.vehicleName}-${s.seatNo}`).join(', ');

  updateFeeDisplay();

  const btn = qs('#submit-btn');
  btn.disabled = selectedSeats.length === 0;
  btn.textContent = selectedSeats.length === 0 ? 'সীট নির্বাচন করুন' : `বুকিং সাবমিট করুন (${toBengaliNumber(selectedSeats.length)}টি সীট)`;
}

async function submitBooking(e) {
  e.preventDefault();
  if (selectedSeats.length === 0) { showToast('অনুগ্রহ করে অন্তত একটি সীট নির্বাচন করুন', 'error'); return; }

  const fd0 = new FormData(e.target);
  const paidAmount0 = Number(fd0.get('paidAmount')) || 0;
  const paymentMethod = fd0.get('paymentMethod') || '';
  const transactionId = (fd0.get('transactionId') || '').trim();

  if (paidAmount0 > 0 && paymentMethod !== 'cash' && !transactionId) {
    showToast('বিকাশ/নগদে পেমেন্ট করলে ট্রানজেকশন আইডি দিন', 'error');
    return;
  }

  const form = e.target;
  const btn = qs('#submit-btn');
  btn.disabled = true;
  btn.textContent = 'সাবমিট হচ্ছে...';

  const fd = new FormData(form);
  const paidAmount = Number(fd.get('paidAmount')) || 0;

  try {
    const res = await apiPost('createBooking', {
      packageId: currentPackage.id,
      date: new Date().toISOString().split('T')[0],
      name: fd.get('name'),
      mobile: fd.get('mobile'),
      address: fd.get('address'),
      seats: selectedSeats,
      delegateFee: currentPackage.delegateFee,
      paidAmount,
      paymentMethod: paidAmount > 0 ? paymentMethod : '',
      transactionId: paidAmount > 0 ? transactionId : ''
    });

    if (!res.ok) {
      showToast(res.error || 'বুকিং ব্যর্থ হয়েছে', 'error');
      btn.disabled = false;
      const seatRes = await apiGet('getSeats', { packageId: currentPackage.id }, { noCache: true });
      currentSeats = seatRes.ok ? seatRes.data : [];
      selectedSeats = [];
      renderVehicles();
      qs('#seat-count').textContent = '০';
      qs('#selected-seat-display').textContent = 'বামপাশ থেকে সীট বেছে নিন';
      updateFeeDisplay();
      return;
    }

    qs('#page-content').innerHTML = `
      <div class="empty-state">
        <div style="font-size:3rem;">✅</div>
        <h2>বুকিং সফল হয়েছে!</h2>
        <p>ক্রম নং <strong>${toBengaliNumber(res.data.serial)}</strong> — ${toBengaliNumber(res.data.seatCount)}টি সীট — এডমিন কনফার্ম করলে আপনার বুকিং নিশ্চিত হবে।</p>
        <p class="text-muted">মোট ফি: ${formatTaka(res.data.totalFee)} · বকেয়া: ${formatTaka(res.data.dueAmount)}</p>
        <p class="text-muted">কনফার্ম হওয়ার পর <a href="ticket.html">টিকেট পেজ</a> থেকে নাম ও মোবাইল দিয়ে টিকেট বের করতে পারবেন।</p>
        <a href="index.html" class="btn btn-forest" style="margin-top:16px;">অন্যান্য প্যাকেজ দেখুন</a>
      </div>
    `;
  } catch (err) {
    showToast('একটি ত্রুটি হয়েছে: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'বুকিং সাবমিট করুন';
  }
}

init();
</script>
</body>
</html>
